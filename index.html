    <script>
      window.onerror = function(msg) {
        if (msg === 'Script error.') return true;
      };
      
      // Force refresh on new version to clear WebViews and PWA caching of old navigation code
      (function() {
        const APP_BUILD_VER = '1.0.8';
        try {
          const storedVer = localStorage.getItem('qran_app_build_version');
          if (storedVer !== APP_BUILD_VER) {
            localStorage.setItem('qran_app_build_version', APP_BUILD_VER);
            
            // Unregister Service Workers
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                for (var i = 0; i < regs.length; i++) {
                  regs[i].unregister();
                }
              });
            }
            
            // Delete Cache API caches
            if ('caches' in window) {
              caches.keys().then(function(names) {
                for (var i = 0; i < names.length; i++) {
                  caches.delete(names[i]);
                }
              });
            }
            
            // Force clean reload after caches are cleared
            setTimeout(function() {
              window.location.reload(true);
            }, 300);
          }
        } catch (e) {
          console.error('Cache buster error:', e);
        }
      })();
    </script>

    <!-- Step 1: Immediately set theme class if needed to prevent FOUC. Must be first. -->
    <script>
      (function() {
        const availableThemes = ['light', 'dark', 'dhuhr', 'duha', 'isha'];
        let storedTheme = null;
        try {
            storedTheme = localStorage.getItem('theme');
        } catch (e) {}
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let themeToSet = 'light'; // New default light theme
        
        if (storedTheme && availableThemes.includes(storedTheme)) {
            themeToSet = storedTheme;
        } else if (prefersDark) {
            themeToSet = 'dark'; // Default dark theme
        }

        const themeClasses = ['dark', ...availableThemes.map(t => `theme-${t}`)];
        document.documentElement.classList.remove(...themeClasses);
        
        document.documentElement.classList.add(`theme-${themeToSet}`);
        if (['dark', 'isha'].includes(themeToSet)) {
            document.documentElement.classList.add('dark');
        }
      })();
    </script>
