<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad-bg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#15803d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#166534;stop-opacity:1" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
     <filter id="drop-shadow" x="-0.2" y="-0.2" width="1.4" height="1.4">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="5" dy="5" result="offsetblur"/>
      <feFlood flood-color="rgba(0,0,0,0.3)"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad-bg)"/>
  
  <g filter="url(#drop-shadow)">
    <text x="50%" y="300" font-family="Amiri Quran, serif" font-size="250" fill="rgba(255, 255, 255, 0.9)" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">۞</text>
  </g>
  
  <text x="50%" y="480" font-family="Tajawal, sans-serif" font-size="100" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-3">QRAN.TOP</text>
  
  <text x="50%" y="550" font-family="Tajawal, sans-serif" font-size="36" font-weight="500" fill="rgba(255, 255, 255, 0.7)" text-anchor="middle">مستكشف المصحف الشريف</text>
</svg>
